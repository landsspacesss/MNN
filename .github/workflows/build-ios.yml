name: Build MNNLLMChat iOS

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'apps/iOS/MNNLLMChat/**'
      - 'package_scripts/ios/**'
      - 'schema/**'
      - 'source/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'apps/iOS/MNNLLMChat/**'
      - 'package_scripts/ios/**'
      - 'schema/**'
      - 'source/**'
  workflow_dispatch:

env:
  XCODE_VERSION: "15.2"
  BUILD_CONFIGURATION: "Release"
  APP_SCHEME: "MNNLLMiOS"
  APP_WORKDIR: "apps/iOS/MNNLLMChat"

jobs:
  build-mnn-framework:
    name: Build MNN.framework for iOS
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          xcodebuild -version
          swift --version

      - name: Install dependencies
        run: |
          if ! command -v cmake &> /dev/null; then
            brew install cmake
          fi

      - name: Build MNN.framework
        run: |
          cd $GITHUB_WORKSPACE
          sh package_scripts/ios/buildiOS.sh "
          -DMNN_ARM82=ON
          -DMNN_LOW_MEMORY=ON
          -DMNN_SUPPORT_TRANSFORMER_FUSE=ON
          -DMNN_BUILD_LLM=ON
          -DMNN_CPU_WEIGHT_DEQUANT_GEMM=ON
          -DMNN_METAL=ON
          -DMNN_BUILD_DIFFUSION=ON
          -DMNN_OPENCL=OFF
          -DMNN_SEP_BUILD=OFF
          -DLLM_SUPPORT_AUDIO=ON
          -DMNN_BUILD_AUDIO=ON
          -DLLM_SUPPORT_VISION=ON
          -DMNN_BUILD_OPENCV=ON
          -DMNN_IMGCODECS=ON
          -DMNN_BUILD_LLM_OMNI=ON
          "

      - name: Upload MNN.framework
        uses: actions/upload-artifact@v4
        with:
          name: MNN-framework
          path: MNN-iOS-CPU-GPU/Static/MNN.framework
          retention-days: 1
          compression-level: 6

  build-ios-app:
    name: Build MNNLLMChat App
    runs-on: macos-14
    needs: build-mnn-framework
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          xcodebuild -version
          swift --version

      - name: Download MNN.framework
        uses: actions/download-artifact@v4
        with:
          name: MNN-framework
          path: ${{ env.APP_WORKDIR }}/MNN.framework

      - name: Fix SPM dependencies for Swift 5.9 compatibility
        working-directory: ${{ env.APP_WORKDIR }}
        run: |
          echo "=== Fixing SPM dependency versions ==="
          
          # 清理所有缓存
          find . -name "Package.resolved" -type f -delete
          rm -rf ~/Library/Developer/Xcode/DerivedData/MNNLLMiOS-*
          rm -rf ./DerivedData ./build
          rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
          rm -rf ~/Library/Caches/org.swift.swiftpm/registry
          
          # 创建兼容的 Package.resolved (锁定 markdownview 到 3.0.0, swift-collections 到 1.1.0)
          mkdir -p MNNLLMiOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          cat > MNNLLMiOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved << 'EOF'
          {
            "originHash" : "d85e1f9a7e0f8c9b2a3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b",
            "pins" : [
              {
                "identity" : "markdownview",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/Yogayu/MarkdownView",
                "state" : {
                  "revision" : "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0",
                  "version" : "3.0.0"
                }
              },
              {
                "identity" : "swift-collections",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/apple/swift-collections",
                "state" : {
                  "revision" : "1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b",
                  "version" : "1.1.0"
                }
              },
              {
                "identity" : "swift-transformers",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/huggingface/swift-transformers",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "sqlite.swift",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/stephencelis/SQLite.swift",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "activityindicatorview",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/exyte/ActivityIndicatorView",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "floatingbutton",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/exyte/FloatingButton",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "swiftui-introspect",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/siteline/swiftui-introspect",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "swift-argument-parser",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/apple/swift-argument-parser.git",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "splash",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/Lakr233/Splash",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "swiftmath",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/Lakr233/SwiftMath",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "lrucache",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/nicklockwood/LRUCache",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "swift-cmark",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/swiftlang/swift-cmark",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "jinja",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/johnmai-dev/Jinja",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              },
              {
                "identity" : "swift-toolchain-sqlite",
                "kind" : "remoteSourceControl",
                "location" : "https://github.com/swiftlang/swift-toolchain-sqlite",
                "state" : {
                  "revision" : "main",
                  "branch" : "main"
                }
              }
            ],
            "version" : 3
          }
          EOF
          
          echo "✓ Created compatible Package.resolved"
          
          # 尝试直接构建（让 Xcode 自动处理依赖）
          echo "=== Skipping pre-resolve, building directly ==="

      - name: Build iOS App (Simulator)
        working-directory: ${{ env.APP_WORKDIR }}
        run: |
          xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -quiet || xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -verbose

      - name: Build iOS App (Device)
        working-directory: ${{ env.APP_WORKDIR }}
        if: github.event_name != 'pull_request'
        run: |
          xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_REQUIRED=NO \
            -skipPackagePluginValidation \
            -quiet || xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_REQUIRED=NO \
            -skipPackagePluginValidation \
            -verbose

      - name: Export .app bundle
        working-directory: ${{ env.APP_WORKDIR }}
        run: |
          APP_PATH=$(find build/Build/Products -name "*.app" -type d 2>/dev/null | head -n1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" ./MNNLLMChat.app
            echo "✓ Exported app to ./MNNLLMChat.app"
          else
            echo "✗ Error: No .app bundle found"
            find build/Build/Products -type d -name "*.app" || true
            exit 1
          fi

      - name: Upload App artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNNLLMChat-App
          path: ${{ env.APP_WORKDIR }}/MNNLLMChat.app
          retention-days: 7
          compression-level: 6
