name: Build MNNLLMChat iOS

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'apps/iOS/MNNLLMChat/**'
      - 'package_scripts/ios/**'
      - 'schema/**'
      - 'source/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'apps/iOS/MNNLLMChat/**'
      - 'package_scripts/ios/**'
      - 'schema/**'
      - 'source/**'
  workflow_dispatch:  # 支持手动触发

env:
  XCODE_VERSION: "15.2"  # 根据需求调整，需与 GitHub Actions macOS 镜像兼容
  IOS_DEPLOYMENT_TARGET: "13.0"
  BUILD_CONFIGURATION: "Release"
  APP_SCHEME: "MNNLLMiOS"

jobs:
  build-mnn-framework:
    name: Build MNN.framework for iOS
    runs-on: macos-14  # 使用 Apple Silicon runner 以获得更好的构建性能
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          xcodebuild -version

      - name: Install dependencies
        run: |
          # 安装 CMake（如果系统版本不满足要求）
          if ! command -v cmake &> /dev/null || [[ $(cmake --version | head -n1 | grep -oP '\d+\.\d+') < "3.15" ]]; then
            brew install cmake
          fi
          # 确保有 zip 工具
          which zip || brew install zip

      - name: Build MNN.framework
        run: |
          cd $GITHUB_WORKSPACE
          # 执行官方构建脚本，传入 LLM 相关参数 [[17]]
          sh package_scripts/ios/buildiOS.sh "
          -DMNN_ARM82=ON
          -DMNN_LOW_MEMORY=ON
          -DMNN_SUPPORT_TRANSFORMER_FUSE=ON
          -DMNN_BUILD_LLM=ON
          -DMNN_CPU_WEIGHT_DEQUANT_GEMM=ON
          -DMNN_METAL=ON
          -DMNN_BUILD_DIFFUSION=ON
          -DMNN_OPENCL=OFF
          -DMNN_SEP_BUILD=OFF
          -DLLM_SUPPORT_AUDIO=ON
          -DMNN_BUILD_AUDIO=ON
          -DLLM_SUPPORT_VISION=ON
          -DMNN_BUILD_OPENCV=ON
          -DMNN_IMGCODECS=ON
          -DMNN_BUILD_LLM_OMNI=ON
          "
        shell: bash

      - name: Verify framework
        run: |
          ls -la MNN-iOS-CPU-GPU/Static/MNN.framework/
          file MNN-iOS-CPU-GPU/Static/MNN.framework/MNN

      - name: Upload MNN.framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN-framework
          path: MNN-iOS-CPU-GPU/Static/MNN.framework
          retention-days: 1
          compression-level: 6

  build-ios-app:
    name: Build MNNLLMChat App
    runs-on: macos-14
    needs: build-mnn-framework
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          xcodebuild -version

      - name: Download MNN.framework
        uses: actions/download-artifact@v4
        with:
          name: MNN-framework
          path: apps/iOS/MNNLLMChat/MNN.framework

      - name: Verify framework placement
        run: |
          ls -la apps/iOS/MNNLLMChat/MNN.framework/
          # 确保 framework 在正确位置并被项目识别

      - name: Restore Swift Package Manager cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/iOS/MNNLLMChat/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install Swift dependencies
        working-directory: apps/iOS/MNNLLMChat
        run: |
          # 预下载 SPM 依赖，避免构建时超时
          xcodebuild -resolvePackageDependencies \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -destination "generic/platform=iOS"

      - name: Build iOS App (Simulator)
        working-directory: apps/iOS/MNNLLMChat
        run: |
          xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            -quiet || xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            -verbose

      - name: Build iOS App (Device - No Code Sign)
        working-directory: apps/iOS/MNNLLMChat
        if: github.event_name != 'pull_request'
        run: |
          xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_REQUIRED=NO \
            -quiet || xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_REQUIRED=NO \
            -verbose

      - name: Export .app bundle
        working-directory: apps/iOS/MNNLLMChat
        run: |
          # 查找构建产物
          APP_PATH=$(find build/Build/Products/${{ env.BUILD_CONFIGURATION }}-iphoneos -name "*.app" -type d | head -n1)
          if [ -n "$APP_PATH" ]; then
            echo "Found app: $APP_PATH"
            cp -r "$APP_PATH" ./MNNLLMChat.app
          else
            echo "Warning: .app bundle not found, checking simulator build..."
            APP_PATH_SIM=$(find build/Build/Products/${{ env.BUILD_CONFIGURATION }}-iphonesimulator -name "*.app" -type d | head -n1)
            [ -n "$APP_PATH_SIM" ] && cp -r "$APP_PATH_SIM" ./MNNLLMChat-Simulator.app
          fi

      - name: Upload App artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNNLLMChat-App
          path: |
            apps/iOS/MNNLLMChat/MNNLLMChat.app
            apps/iOS/MNNLLMChat/MNNLLMChat-Simulator.app
          retention-days: 7
          if-no-files-found: warn

  # 可选：发布到 GitHub Releases
  release:
    name: Create Release
    runs-on: macos-14
    needs: build-ios-app
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: MNNLLMChat-App
          path: ./build-output

      - name: Create archive
        run: |
          cd ./build-output
          # 压缩 .app 为 .zip（iOS 侧载格式）
          if [ -d "MNNLLMChat.app" ]; then
            zip -r MNNLLMChat-iOS.zip MNNLLMChat.app
          fi
          if [ -d "MNNLLMChat-Simulator.app" ]; then
            zip -r MNNLLMChat-Simulator.zip MNNLLMChat-Simulator.app
          fi
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: "MNNLLMChat iOS Build #${{ github.run_number }}"
          body: |
            Auto-built iOS application from commit ${{ github.sha }}
            
            ## Artifacts
            - `MNNLLMChat-iOS.zip`: Device build (requires signing for installation)
            - `MNNLLMChat-Simulator.zip`: Simulator build (for testing in Xcode Simulator)
            
            > ⚠️ Note: Device builds require valid Apple Developer signing to install on physical devices.
          files: |
            ./build-output/MNNLLMChat-iOS.zip
            ./build-output/MNNLLMChat-Simulator.zip
          draft: true
          prerelease: false
