name: Build MNNLLMChat iOS

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'apps/iOS/MNNLLMChat/**'
      - 'package_scripts/ios/**'
      - 'schema/**'
      - 'source/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'apps/iOS/MNNLLMChat/**'
      - 'package_scripts/ios/**'
      - 'schema/**'
      - 'source/**'
  workflow_dispatch:

env:
  XCODE_VERSION: "16.2"
  BUILD_CONFIGURATION: "Release"
  APP_SCHEME: "MNNLLMiOS"
  APP_WORKDIR: "apps/iOS/MNNLLMChat"

jobs:
  build-mnn-framework:
    name: Build MNN.framework for iOS
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          xcodebuild -version
          swift --version

      - name: Install dependencies
        run: |
          if ! command -v cmake &> /dev/null; then
            brew install cmake
          fi

      - name: Build MNN.framework
        run: |
          cd $GITHUB_WORKSPACE
          sh package_scripts/ios/buildiOS.sh "
          -DMNN_ARM82=ON
          -DMNN_LOW_MEMORY=ON
          -DMNN_SUPPORT_TRANSFORMER_FUSE=ON
          -DMNN_BUILD_LLM=ON
          -DMNN_CPU_WEIGHT_DEQUANT_GEMM=ON
          -DMNN_METAL=ON
          -DMNN_BUILD_DIFFUSION=ON
          -DMNN_OPENCL=OFF
          -DMNN_SEP_BUILD=OFF
          -DLLM_SUPPORT_AUDIO=ON
          -DMNN_BUILD_AUDIO=ON
          -DLLM_SUPPORT_VISION=ON
          -DMNN_BUILD_OPENCV=ON
          -DMNN_IMGCODECS=ON
          -DMNN_BUILD_LLM_OMNI=ON
          "

      - name: Upload MNN.framework
        uses: actions/upload-artifact@v4
        with:
          name: MNN-framework
          path: MNN-iOS-CPU-GPU/Static/MNN.framework
          retention-days: 1
          compression-level: 6

  build-ios-app:
    name: Build MNNLLMChat App
    runs-on: macos-15
    needs: build-mnn-framework
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          xcodebuild -version
          swift --version

      - name: Download MNN.framework
        uses: actions/download-artifact@v4
        with:
          name: MNN-framework
          path: ${{ env.APP_WORKDIR }}/MNN.framework

      - name: Clean Package.resolved
        working-directory: ${{ env.APP_WORKDIR }}
        run: |
          echo "=== Removing Package.resolved ==="
          find . -name "Package.resolved" -type f -delete
          rm -rf ~/Library/Developer/Xcode/DerivedData/MNNLLMiOS-*
          rm -rf ./DerivedData ./build
          echo "✓ Cleaned"

      - name: Resolve package dependencies
        working-directory: ${{ env.APP_WORKDIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -destination "generic/platform=iOS Simulator" \
            -clonedSourcePackagesDirPath ./DerivedData/SourcePackages

      - name: Build iOS App (Simulator)
        working-directory: ${{ env.APP_WORKDIR }}
        run: |
          xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation

      - name: Build iOS App (Device)
        working-directory: ${{ env.APP_WORKDIR }}
        if: github.event_name != 'pull_request'
        run: |
          xcodebuild build \
            -project MNNLLMiOS.xcodeproj \
            -scheme ${{ env.APP_SCHEME }} \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_REQUIRED=NO \
            -skipPackagePluginValidation

      - name: Export .app bundle
        working-directory: ${{ env.APP_WORKDIR }}
        run: |
          APP_PATH=$(find build/Build/Products -name "*.app" -type d 2>/dev/null | head -n1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" ./MNNLLMChat.app
            echo "✓ Exported"
          else
            exit 1
          fi

      - name: Upload App artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNNLLMChat-App
          path: ${{ env.APP_WORKDIR }}/MNNLLMChat.app
          retention-days: 7
          compression-level: 6
