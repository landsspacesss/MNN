name: iOS MNN LLM Chat Build Unsigned
on:
  workflow_dispatch:

jobs:
  build-mnn-framework:
    name: Build MNN Framework
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build MNN iOS Framework
        run: |
          cd project/ios
          
          MNN_ROOT="${{ github.workspace }}"
          
          rm -rf MNN-iOS-CPU-GPU
          mkdir -p MNN-iOS-CPU-GPU/Static/ios_64
          cd MNN-iOS-CPU-GPU/Static/ios_64
          
          cmake "$MNN_ROOT" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$MNN_ROOT/cmake/ios.toolchain.cmake" \
            -DMNN_METAL=ON \
            -DARCHS="arm64" \
            -DENABLE_BITCODE=0 \
            -DMNN_AAPL_FMWK=1 \
            -DMNN_SEP_BUILD=0 \
            -DMNN_ARM82=true \
            -DMNN_BUILD_SHARED_LIBS=false \
            -DMNN_USE_THREAD_POOL=OFF \
            -DMNN_LOW_MEMORY=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_BUILD_DIFFUSION=ON \
            -DMNN_BUILD_OPENCV=ON \
            -DMNN_IMGCODECS=ON \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true
          
          make MNN -j$(sysctl -n hw.ncpu)
          
          cd ..
          mv ios_64/MNN.framework MNN.framework
          rm -rf ios_64
      
      - name: Upload MNN Framework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN.framework
          path: project/ios/MNN-iOS-CPU-GPU/Static/MNN.framework
          if-no-files-found: error
          retention-days: 7

  build-unsigned-ipa:
    name: Build Unsigned IPA
    runs-on: macos-latest
    needs: build-mnn-framework
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Clean Xcode and SPM Cache
        run: |
          echo "=== 清理 Xcode 和 SPM 缓存 ==="
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Caches/org.swift.swiftpm/
          rm -rf .build/
      
      - name: Download MNN Framework
        uses: actions/download-artifact@v4
        with:
          name: MNN.framework
          path: apps/iOS/MNNLLMChat/Frameworks/MNN.framework
      
      - name: Resolve Swift Packages
        run: |
          cd apps/iOS/MNNLLMChat
          
          echo "=== 解析 Swift Packages ==="
          xcodebuild -resolvePackageDependencies \
            -project MNNLLMiOS.xcodeproj \
            -scheme MNNLLMiOS \
            -destination 'generic/platform=iOS' \
            2>&1 | tee resolve.log
          
          echo "=== 检查 SourcePackages ==="
          ls -la ~/Library/Developer/Xcode/DerivedData/*/SourcePackages/checkouts/ 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "cmark-gfm*" -type d 2>/dev/null | head -5
      
      - name: Pre-build cmark-gfm (Fix config.h)
        run: |
          echo "=== 查找并修复 cmark-gfm ==="
          
          # 查找 cmark-gfm 目录
          CMARK_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "cmark-gfm" -type d 2>/dev/null | head -1)
          
          if [ -n "$CMARK_PATH" ]; then
            echo "找到 cmark-gfm: $CMARK_PATH"
            
            # 检查是否存在 config.h
            if [ ! -f "$CMARK_PATH/src/cmark-gfm_config.h" ]; then
              echo "生成 cmark-gfm_config.h..."
              
              # 进入 cmark-gfm 目录并运行 cmake 生成配置文件
              cd "$CMARK_PATH"
              
              # 创建构建目录并生成配置
              mkdir -p build
              cd build
              cmake .. \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE=$(xcrun --show-sdk-path)/../Toolchains/XcodeDefault.xctoolchain/usr/share/cmake/ios.toolchain.cmake \
                -DARCHS="arm64" \
                -DENABLE_BITCODE=NO
              
              # 复制生成的 config.h
              if [ -f "src/cmark-gfm_config.h" ]; then
                cp src/cmark-gfm_config.h ../src/
                echo "已复制 cmark-gfm_config.h"
              elif [ -f "cmark-gfm_config.h" ]; then
                cp cmark-gfm_config.h ../src/
                echo "已复制 cmark-gfm_config.h (根目录)"
              fi
            else
              echo "cmark-gfm_config.h 已存在"
            fi
          else
            echo "警告: 未找到 cmark-gfm 目录"
          fi
      
      - name: Build and Archive (Unsigned)
        run: |
          set -e
          cd apps/iOS/MNNLLMChat
          
          rm -rf build MNNLLMiOS.xcarchive
          
          ARCHIVE_PATH="${{ github.workspace }}/apps/iOS/MNNLLMChat/MNNLLMiOS.xcarchive"
          
          echo "=== 开始构建 Archive ==="
          
          # 使用 -skipPackagePluginValidation 避免 SPM 插件验证问题
          set -o pipefail
          xcodebuild clean archive \
            -project MNNLLMiOS.xcodeproj \
            -scheme MNNLLMiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            2>&1 | tee build.log
          
          EXIT_CODE=$?
          echo "=== xcodebuild 退出码: $EXIT_CODE ==="
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== 构建失败，查看详细日志 ==="
            cat build.log | tail -150
            exit 1
          fi
      
      - name: Create Unsigned IPA
        if: success()
        run: |
          set -e
          cd apps/iOS/MNNLLMChat
          
          ARCHIVE_PATH="${{ github.workspace }}/apps/iOS/MNNLLMChat/MNNLLMiOS.xcarchive"
          
          APP_PATH=$(find "$ARCHIVE_PATH" -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误: 未找到 .app 文件"
            exit 1
          fi
          
          echo "找到 .app: $APP_PATH"
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MNNLLMiOS-unsigned.ipa Payload
          rm -rf Payload
          
          ls -lh MNNLLMiOS-unsigned.ipa
      
      - name: Upload Unsigned IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MNNLLMiOS-unsigned-ipa
          path: apps/iOS/MNNLLMChat/MNNLLMiOS-unsigned.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: apps/iOS/MNNLLMChat/build.log
          retention-days: 3
