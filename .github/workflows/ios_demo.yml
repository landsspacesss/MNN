name: iOS MNN LLM Chat Build Unsigned IPA

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-mnn-framework:
    name: Build MNN Framework
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build MNN iOS Framework
        run: |
          cd project/ios
          
          MNN_ROOT="${{ github.workspace }}"
          
          rm -rf MNN-iOS-CPU-GPU
          mkdir -p MNN-iOS-CPU-GPU/Static/ios_64
          cd MNN-iOS-CPU-GPU/Static/ios_64
          
          cmake "$MNN_ROOT" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$MNN_ROOT/cmake/ios.toolchain.cmake" \
            -DMNN_METAL=ON \
            -DARCHS="arm64" \
            -DENABLE_BITCODE=0 \
            -DMNN_AAPL_FMWK=1 \
            -DMNN_SEP_BUILD=0 \
            -DMNN_ARM82=true \
            -DMNN_BUILD_SHARED_LIBS=false \
            -DMNN_USE_THREAD_POOL=OFF \
            -DMNN_LOW_MEMORY=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true
          
          make MNN -j$(sysctl -n hw.ncpu)
          
          cd ..
          mv ios_64/MNN.framework MNN.framework
          rm -rf ios_64
      
      - name: Upload MNN Framework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN.framework
          path: project/ios/MNN-iOS-CPU-GPU/Static/MNN.framework
          if-no-files-found: error
          retention-days: 7

  build-unsigned-ipa:
    name: Build Unsigned IPA
    runs-on: macos-latest
    needs: build-mnn-framework
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Download MNN Framework
        uses: actions/download-artifact@v4
        with:
          name: MNN.framework
          path: apps/iOS/MNNLLMChat/Frameworks/MNN.framework
      
      - name: Verify Framework
        run: |
          echo "=== 验证 Framework ==="
          ls -la apps/iOS/MNNLLMChat/Frameworks/
          ls -la apps/iOS/MNNLLMChat/Frameworks/MNN.framework/ || echo "Framework 不存在"
      
      - name: Build and Archive (Unsigned)
        run: |
          cd apps/iOS/MNNLLMChat
          
          echo "=== 当前目录 ==="
          pwd
          ls -la
          
          # 清理
          rm -rf build MNNLLMiOS.xcarchive
          
          # 使用绝对路径
          ARCHIVE_PATH="${{ github.workspace }}/apps/iOS/MNNLLMChat/MNNLLMiOS.xcarchive"
          
          echo "=== 开始构建 Archive ==="
          echo "Archive 路径: $ARCHIVE_PATH"
          
          # 执行构建，确保错误被捕获
          set -o pipefail
          xcodebuild clean archive \
            -project MNNLLMiOS.xcodeproj \
            -scheme MNNLLMiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO | tee build.log
          
          EXIT_CODE=$?
          echo "=== xcodebuild 退出码: $EXIT_CODE ==="
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "xcodebuild 失败，查看日志:"
            cat build.log
            exit 1
          fi
          
          echo "=== 构建完成，检查 Archive ==="
          ls -la "$ARCHIVE_PATH" || echo "Archive 目录不存在"
      
      - name: Create Unsigned IPA
        if: success()
        run: |
          cd apps/iOS/MNNLLMChat
          
          ARCHIVE_PATH="${{ github.workspace }}/apps/iOS/MNNLLMChat/MNNLLMiOS.xcarchive"
          
          echo "=== 检查 Archive 内容 ==="
          ls -la "$ARCHIVE_PATH" || true
          find "$ARCHIVE_PATH" -type f -name "*.app" 2>/dev/null || true
          
          # 查找 .app 文件
          APP_PATH=$(find "$ARCHIVE_PATH" -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误: 在 Archive 中未找到 .app 文件"
            echo "Archive 完整内容:"
            find "$ARCHIVE_PATH"
            exit 1
          fi
          
          echo "找到 .app: $APP_PATH"
          
          # 创建 Payload 目录并打包
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          
          # 打包为 IPA
          zip -r MNNLLMiOS-unsigned.ipa Payload
          rm -rf Payload
          
          echo "成功创建 IPA:"
          ls -lh MNNLLMiOS-unsigned.ipa
      
      - name: Upload Unsigned IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MNNLLMiOS-unsigned-ipa
          path: apps/iOS/MNNLLMChat/MNNLLMiOS-unsigned.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: apps/iOS/MNNLLMChat/build.log
          retention-days: 3
