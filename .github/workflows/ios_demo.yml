name: iOS MNN LLM Chat Build (Fixed)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-mnn-framework:
    name: Build MNN Framework
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build MNN iOS Framework
        run: |
          # 必须在 project/ios 目录下运行脚本
          cd project/ios
          
          # 从 package_scripts/ios 复制脚本到当前目录
          cp ../../package_scripts/ios/buildiOS.sh .
          
          # 执行构建（传递 LLM 相关参数）
          sh buildiOS.sh "\
            -DMNN_ARM82=true \
            -DMNN_LOW_MEMORY=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_METAL=ON \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true"
      
      - name: Verify Framework
        run: |
          echo "=== 当前目录结构 ==="
          pwd
          ls -la project/ios/
          
          echo "=== 查找 MNN.framework ==="
          find project/ios -name "MNN.framework" -type d 2>/dev/null || true
          
          echo "=== 检查 MNN-iOS-CPU-GPU 目录 ==="
          ls -la project/ios/MNN-iOS-CPU-GPU/ 2>/dev/null || true
          ls -la project/ios/MNN-iOS-CPU-GPU/Static/ 2>/dev/null || true
      
      - name: Upload MNN Framework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN.framework
          path: project/ios/MNN-iOS-CPU-GPU/Static/MNN.framework
          if-no-files-found: error
          retention-days: 7

  build-ios-app:
    name: Build iOS App
    runs-on: macos-latest
    needs: build-mnn-framework
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Download MNN Framework
        uses: actions/download-artifact@v4
        with:
          name: MNN.framework
          path: apps/iOS/MNNLLMChat/Frameworks/MNN.framework
      
      - name: Verify Download
        run: |
          echo "=== 验证下载的 framework ==="
          ls -la apps/iOS/MNNLLMChat/Frameworks/
          ls -la apps/iOS/MNNLLMChat/Frameworks/MNN.framework/ || true

      - name: Build iOS App (Simulator)
        run: |
          cd apps/iOS/MNNLLMChat
          
          xcodebuild clean build \
            -project MNNLLMiOS.xcodeproj \
            -scheme MNNLLMiOS \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
