name: iOS MNN LLM Chat Build Unsigned IPA

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-mnn-framework:
    name: Build MNN Framework
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build MNN iOS Framework (With Diffusion)
        run: |
          cd project/ios
          
          MNN_ROOT="${{ github.workspace }}"
          
          rm -rf MNN-iOS-CPU-GPU
          mkdir -p MNN-iOS-CPU-GPU/Static/ios_64
          cd MNN-iOS-CPU-GPU/Static/ios_64
          
          # 启用 diffusion 和必要依赖
          cmake "$MNN_ROOT" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$MNN_ROOT/cmake/ios.toolchain.cmake" \
            -DMNN_METAL=ON \
            -DARCHS="arm64" \
            -DENABLE_BITCODE=0 \
            -DMNN_AAPL_FMWK=1 \
            -DMNN_SEP_BUILD=0 \
            -DMNN_ARM82=true \
            -DMNN_BUILD_SHARED_LIBS=false \
            -DMNN_USE_THREAD_POOL=OFF \
            -DMNN_LOW_MEMORY=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_BUILD_DIFFUSION=ON \
            -DMNN_BUILD_OPENCV=ON \
            -DMNN_IMGCODECS=ON \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true
          
          make MNN -j$(sysctl -n hw.ncpu)
          
          cd ..
          mv ios_64/MNN.framework MNN.framework
          rm -rf ios_64
          
          # 检查 framework 结构，确保头文件正确
          echo "=== 检查 Framework 头文件 ==="
          ls -la MNN.framework/Headers/ | head -20
          find MNN.framework/Headers -name "diffusion*" -type f || echo "未找到 diffusion 头文件"
      
      - name: Upload MNN Framework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN.framework
          path: project/ios/MNN-iOS-CPU-GPU/Static/MNN.framework
          if-no-files-found: error
          retention-days: 7

  build-unsigned-ipa:
    name: Build Unsigned IPA
    runs-on: macos-latest
    needs: build-mnn-framework
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Download MNN Framework
        uses: actions/download-artifact@v4
        with:
          name: MNN.framework
          path: apps/iOS/MNNLLMChat/Frameworks/MNN.framework
      
      - name: Verify Framework and Headers
        run: |
          echo "=== 验证 Framework ==="
          ls -la apps/iOS/MNNLLMChat/Frameworks/
          ls -la apps/iOS/MNNLLMChat/Frameworks/MNN.framework/Headers/ | head -20
          
          echo "=== 查找 diffusion 头文件 ==="
          find apps/iOS/MNNLLMChat/Frameworks/MNN.framework -name "*diffusion*" -type f || echo "未找到 diffusion 头文件"
          
          echo "=== 检查 MNN 头文件目录 ==="
          ls -la apps/iOS/MNNLLMChat/Frameworks/MNN.framework/Headers/MNN/ 2>/dev/null || echo "MNN 子目录不存在"
      
      - name: Add Header Search Paths (Fix)
        run: |
          cd apps/iOS/MNNLLMChat
          
          # 如果 framework 中没有 diffusion 头文件，从源码复制
          if [ ! -f "Frameworks/MNN.framework/Headers/MNN/diffusion/diffusion.hpp" ]; then
            echo "从 MNN 源码复制 diffusion 头文件..."
            mkdir -p Frameworks/MNN.framework/Headers/MNN/diffusion
            cp ${{ github.workspace }}/include/MNN/diffusion/diffusion.hpp Frameworks/MNN.framework/Headers/MNN/diffusion/ 2>/dev/null || \
            cp ${{ github.workspace }}/source/diffusion/diffusion.hpp Frameworks/MNN.framework/Headers/MNN/diffusion/ 2>/dev/null || \
            echo "警告: 无法找到 diffusion.hpp 源文件"
          fi
      
      - name: Build and Archive (Unsigned)
        run: |
          set -e
          cd apps/iOS/MNNLLMChat
          
          rm -rf build MNNLLMiOS.xcarchive
          
          ARCHIVE_PATH="${{ github.workspace }}/apps/iOS/MNNLLMChat/MNNLLMiOS.xcarchive"
          
          echo "=== 开始构建 Archive ==="
          
          set -o pipefail
          xcodebuild clean archive \
            -project MNNLLMiOS.xcodeproj \
            -scheme MNNLLMiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            HEADER_SEARCH_PATHS="${{ github.workspace }}/include ${{ github.workspace }}/source" \
            2>&1 | tee build.log
          
          EXIT_CODE=$?
          echo "=== xcodebuild 退出码: $EXIT_CODE ==="
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== 构建失败，查看详细日志 ==="
            cat build.log | tail -100
            exit 1
          fi
      
      - name: Create Unsigned IPA
        if: success()
        run: |
          set -e
          cd apps/iOS/MNNLLMChat
          
          ARCHIVE_PATH="${{ github.workspace }}/apps/iOS/MNNLLMChat/MNNLLMiOS.xcarchive"
          
          APP_PATH=$(find "$ARCHIVE_PATH" -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误: 未找到 .app 文件"
            exit 1
          fi
          
          echo "找到 .app: $APP_PATH"
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MNNLLMiOS-unsigned.ipa Payload
          rm -rf Payload
          
          ls -lh MNNLLMiOS-unsigned.ipa
      
      - name: Upload Unsigned IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MNNLLMiOS-unsigned-ipa
          path: apps/iOS/MNNLLMChat/MNNLLMiOS-unsigned.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: apps/iOS/MNNLLMChat/build.log
          retention-days: 3
