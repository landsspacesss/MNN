name: iOS MNN LLM Chat Build (Fixed)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-mnn-framework:
    name: Build MNN Framework
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Verify CMakeLists.txt location
        run: |
          echo "=== 查找 CMakeLists.txt ==="
          find ${{ github.workspace }} -name "CMakeLists.txt" -maxdepth 2 | head -5
          
          echo "=== 仓库根目录内容 ==="
          ls -la ${{ github.workspace }}/
      
      - name: Build MNN iOS Framework
        run: |
          cd project/ios
          
          # 使用绝对路径执行构建
          MNN_ROOT="${{ github.workspace }}"
          
          rm -rf MNN-iOS-CPU-GPU
          mkdir -p MNN-iOS-CPU-GPU/Static/ios_64
          cd MNN-iOS-CPU-GPU/Static/ios_64
          
          cmake "$MNN_ROOT" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$MNN_ROOT/cmake/ios.toolchain.cmake" \
            -DMNN_METAL=ON \
            -DARCHS="arm64" \
            -DENABLE_BITCODE=0 \
            -DMNN_AAPL_FMWK=1 \
            -DMNN_SEP_BUILD=0 \
            -DMNN_ARM82=true \
            -DMNN_BUILD_SHARED_LIBS=false \
            -DMNN_USE_THREAD_POOL=OFF \
            -DMNN_LOW_MEMORY=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true
          
          make MNN -j$(sysctl -n hw.ncpu)
          
          cd ..
          mv ios_64/MNN.framework MNN.framework
          rm -rf ios_64
      
      - name: Verify Framework
        run: |
          echo "=== 验证 framework ==="
          ls -la project/ios/MNN-iOS-CPU-GPU/Static/MNN.framework
      
      - name: Upload MNN Framework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN.framework
          path: project/ios/MNN-iOS-CPU-GPU/Static/MNN.framework
          if-no-files-found: error
          retention-days: 7

  build-ios-app:
    name: Build iOS App
    runs-on: macos-latest
    needs: build-mnn-framework
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Download MNN Framework
        uses: actions/download-artifact@v4
        with:
          name: MNN.framework
          path: apps/iOS/MNNLLMChat/Frameworks/MNN.framework
      
      - name: Build iOS App (Simulator)
        run: |
          cd apps/iOS/MNNLLMChat
          
          xcodebuild clean build \
            -project MNNLLMiOS.xcodeproj \
            -scheme MNNLLMiOS \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
