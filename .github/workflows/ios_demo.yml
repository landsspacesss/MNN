name: iOS MNN LLM Chat Build (Fixed)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-mnn-framework:
    name: Build MNN Framework
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build MNN iOS Framework
        working-directory: package_scripts/ios
        run: |
          sh buildiOS.sh "\
            -DMNN_ARM82=true \
            -DMNN_LOW_MEMORY=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_METAL=ON"
      
      - name: Verify Framework
        run: |
          echo "=== 验证 framework 是否存在 ==="
          ls -la package_scripts/ios/MNN-iOS-CPU-GPU/Static/MNN.framework
      
      - name: Upload MNN Framework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN.framework
          path: package_scripts/ios/MNN-iOS-CPU-GPU/Static/MNN.framework
          if-no-files-found: error
          retention-days: 7

  build-ios-app:
    name: Build iOS App
    runs-on: macos-latest
    needs: build-mnn-framework
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Download MNN Framework
        uses: actions/download-artifact@v4
        with:
          name: MNN.framework
          path: apps/iOS/MNNLLMChat/Frameworks/MNN.framework
      
      - name: Verify Download
        run: |
          echo "=== 验证下载的 framework ==="
          ls -la apps/iOS/MNNLLMChat/Frameworks/
          ls -la apps/iOS/MNNLLMChat/Frameworks/MNN.framework/
      
      - name: Build iOS App (Simulator)
        run: |
          cd apps/iOS/MNNLLMChat
          
          xcodebuild clean build \
            -project MNNLLMiOS.xcodeproj \
            -scheme MNNLLMiOS \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
